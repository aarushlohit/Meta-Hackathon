name: adaptive-cyber-crisis-environment
description: Deterministic OpenEnv environment for cyber alert triage with adaptive escalation.
environment:
  module: env
  class: CyberEnv
server:
  app: server.app:app
tasks:
  - id: easy
    config:
      task: easy
    grader:
      module: grader
      function: grade_easy
  - id: medium
    config:
      task: medium
    grader:
      module: grader
      function: grade_medium
  - id: hard
    config:
      task: hard
    grader:
      module: grader
      function: grade_hard
